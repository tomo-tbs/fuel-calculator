<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交通費割り勘計算</title>
<style>
body {
    font-family: sans-serif;
    padding: 20px;
    max-width: 500px;
}

input, select {
    width: 100%;
    padding: 8px;
    box-sizing: border-box;
    margin-bottom: 10px;
    font-size: 16px;
}

button {
    margin-top: 10px;
    padding: 8px 12px;
    font-size: 16px;
}

button:disabled {
    background-color: #ccc;
    cursor: not-allowed;
}

#people {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 10px;
}

#people label {
    display: block;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
}

#people input {
    display: none;
}

#people input:checked + span,
#people label:has(input:checked) {
    background-color: #007bff;
    color: white;
    border-color: #007bff;
}

.section {
    margin-top: 24px;
    padding: 15px;
    border-radius: 12px;
    background: #f8f9fa;
    border: 1px solid #ddd;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.section-title {
    font-weight: bold;
    margin-bottom: 10px;
    font-size: 16px;
    color: #333;
    border-left: 4px solid #007bff;
    padding-left: 8px;
}

/* 高速代入力行 */
.toll {
    display: flex;
    gap: 5px;
    align-items: stretch; /* inputとボタンの高さ揃え */
    margin-bottom: 5px;
}

.toll input {
    flex: 1;
    min-width: 0;
    height: 40px;
    padding: 8px;
}

.removeToll {
    flex-shrink: 0;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 12px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    background: #dc3545;
    color: #fff;
    cursor: pointer;
}
.removeToll:hover {
    background: #c82333;
}

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
}

.modal-content {
    background: white;
    margin: 10% auto;
    padding: 15px;
    width: 90%;
    max-width: 400px;
    border-radius: 10px;
}

#templateResults div {
    padding: 12px;
    margin-bottom: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: white;
    cursor: pointer;
    transition: 0.2s;
}

/* ホバー（PC） */
#templateResults div:hover {
    background: #007bff;
    color: white;
    border-color: #007bff;
}

/* 押したとき */
#templateResults div:active {
    transform: scale(0.97);
}

/* スマホでも分かるように */
#templateResults div::after {
    content: "▶ 選択";
    float: right;
    font-size: 12px;
    opacity: 0.6;
}
.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.templateBtn {
    margin-top: 0;      /* 既存のbuttonのmargin潰す */
    width: auto;        /* 100%指定されてたら解除 */
    white-space: nowrap; /* 改行防止 */
}
</style>
</head>
<body>

<h2>交通費計算</h2>

<!-- 基本情報 -->
<div class="section">
    <div class="section-title">基本情報</div>
    <label>人数</label>
    <input type="number" id="people" min="2" max="10" value="2">

    <label>燃費 (km/L)</label>
    <input type="number" id="fuelEfficiency" step="0.1" value="20.0">

    <label>ガソリン代 (円/L)</label>
    <input type="number" id="gasPrice" value="150.0">
</div>

<!-- 走行情報 -->
<div class="section">
    <div class="section-header">
        <div class="section-title">走行情報</div>
        <button type="button" class="templateBtn" onclick="openTemplateDialog()">
            テンプレートから設定
        </button>
    </div>
    <!--
    <div class="section-title">走行情報</div>
    <label>テンプレート</label>
    <select id="template" onchange="applyTemplate()">
        <option value="">選択してください</option>
    </select>
    -->

    <label>走行距離 (km)</label>
    <input type="number" id="distance" step="0.1" value="300">

    <label>高速代</label>
    <div id="tollContainer">
        <div class="toll">
            <input type="number" class="tollInput" placeholder="高速代">
            <button type="button" class="removeToll">×</button>
        </div>
    </div>
    <button type="button" onclick="addToll()">＋高速代追加</button>
</div>

<!-- 計算オプション -->
<div class="section">
    <div class="section-title">計算オプション</div>
    <label>端数処理</label>
    <select id="rounding">
        <option value="1">端数なし</option>
        <option value="100" selected>100円単位で切り上げ</option>
        <option value="500">500円単位で切り上げ</option>
        <option value="1000">1000円単位で切り上げ</option>
    </select>

    <label>ドライバー控除</label>
    <select id="driverType" onchange="document.getElementById('driverValue').style.display=this.value==='none'?'none':'block'">
        <option value="none">なし</option>
        <option value="fixed">固定額（円）</option>
        <option value="percent">割合（％）</option>
    </select>
    <input type="number" id="driverValue" placeholder="金額 or 割合" style="display:none;">
</div>

<hr>
<button onclick="calculate()">計算</button>

<h3>結果</h3>
<div id="result" style="font-size: 20px; font-weight: bold;"></div>

<hr>
<button class="calc-required" disabled onclick="share(true)">結果を共有</button>
<button class="calc-required" disabled onclick="share(false)">結果をコピー</button>

<div id="templateModal" class="modal">
  <div class="modal-content">

    <h3>テンプレ検索</h3>
    <p style="font-size:12px; opacity:0.7;">テンプレートを選択すると、距離と高速代が自動入力されます</p>
    <label>出発地</label>
    <select id="startFilter" onchange="filterTemplates()">
      <option value="">すべて</option>
    </select>

    <label>目的地</label>
    <select id="goalFilter" onchange="filterTemplates()">
      <option value="">すべて</option>
    </select>

    <div id="templateResults"></div>

    <button onclick="closeTemplateDialog()">閉じる</button>
  </div>
</div>

<script>

// 計算済みFlg
let isCalculated = false;

// 各項目にフォーカスが当たったら全選択状態にする
document.addEventListener("focusin", function (e) {
    if (e.target.matches("input[type='number']")) {
        setTimeout(() => e.target.select(), 0);
    }
});

// 控除方式が切り替わったら,Inputの表示/非表示を切り替える
document.getElementById("driverType").addEventListener("change", function () {
    const input = document.getElementById("driverValue");

    if (this.value === "none") {
        input.style.display = "none";
    } else {
        input.style.display = "block";
    }
});

// 入力内容が変更されたら,共有/コピーボタンを押下不可にする
document.querySelectorAll("input, select").forEach(el => {
    el.addEventListener("change", () => {
        isCalculated = false;
        setCalculatedState(false);
    });
});

// 状態に応じてcalc-requiredクラスが付与されたボタンの状態を切り替える
function setCalculatedState(flag) {
    const buttons = document.querySelectorAll(".calc-required");

    buttons.forEach(btn => {
        btn.disabled = !flag;
    });
}


// 高速代入力エリア追加
function addToll() {
    const container = document.getElementById('tollContainer');
    const div = document.createElement('div');
    div.className = 'toll';
    div.innerHTML = `<input type="number" class="tollInput" placeholder="高速代">
                     <button type="button" class="removeToll">×</button>`;
    container.appendChild(div);

    // フォーカス移動（スマホOK）
    input.focus();
    setTimeout(() => input.select(), 0);
}

// 高速代入力エリア削除
document.addEventListener("click", function (e) {
    if (e.target.classList.contains("removeToll")) {

        const toll = e.target.closest(".toll");
        const container = document.getElementById("tollContainer");

        // 1件は残す（UX的に）
        if (container.children.length <= 1) {
            toll.querySelector("input").value = "";
            return;
        }

        toll.remove();
    }
});

function calculate() {

    const people = parseInt(document.getElementById("people").value) || 0;
    const fuelEfficiency = parseFloat(document.getElementById("fuelEfficiency").value) || 0;
    const gasPrice = parseInt(document.getElementById("gasPrice").value) || 0;
    const distance = parseFloat(document.getElementById("distance").value) || 0;
    const roundingUnit = parseInt(document.getElementById("rounding").value) || 1;

    if (people < 2) {
        alert("人数は2人以上にしてください");
        return;
    }

    // ガソリン代計算
    let fuelCost = 0;
    if (fuelEfficiency > 0) {
        fuelCost = (distance / fuelEfficiency) * gasPrice;
    }

    // 高速代合計
    const tollInputs = document.querySelectorAll(".tollInput");
    let tollTotal = 0;
    tollInputs.forEach(input => {
        tollTotal += parseInt(input.value) || 0;
    });

    const total = fuelCost + tollTotal;

    // ===== ドライバー控除 =====
    const driverType = document.getElementById("driverType").value;
    const driverValue = parseFloat(document.getElementById("driverValue").value) || 0;
    
    // 計算式
    // 総ガソリン代 = 距離/燃費 * ガソリン代
    // 総高速代 = SUM(高速代)
    // 支払い総計 = 総ガソリン代 + 総高速代
    
    // 基本支払額は支払い総計 / 人数となる
    
    // ドライバー控除なしなら,均等割りを指定桁で切り上げた金額
    
    // ドライバー控除ありなら,ドライバーは(基本支払額 - 控除)を指定桁で切り上げた金額
    // 他メンバーは基本支払額 + (控除 / ドライバー以外の人数)を指定桁で切り上げた金額
    
    // どちらの場合でも,切り上げによって発生する差額は集計担当者の取り分と想定
    // (現在の使用シチュエーション的にはドライバーの取り分になる)

    // 基本額
    const base = total / people;

    let driverPay, otherPay;

    if (driverType === "none") {

        // 全員同じ（個別に切り上げ）
        const perPerson = Math.ceil(base / roundingUnit) * roundingUnit;

        driverPay = perPerson;
        otherPay = perPerson;

    } else {

        let discount = 0;

        if (driverType === "fixed") {
            discount = driverValue;
        } else if (driverType === "percent") {
            discount = base * (driverValue / 100);
        }

        // ②③ 再配分
        driverPay = base - discount;
        otherPay = base + (discount / (people - 1));

        // マイナス防止
        driverPay = Math.max(0, driverPay);

        // ④ 個別に切り上げ
        driverPay = Math.ceil(driverPay / roundingUnit) * roundingUnit;
        otherPay  = Math.ceil(otherPay  / roundingUnit) * roundingUnit;
    }

    // ===== 差額（＝ドライバー取り分）=====
    const totalPaid = driverPay + otherPay * (people - 1);
    const diff = totalPaid - total;
    // ===== 表示 =====
    document.getElementById("result").innerHTML = `
        総額: ${Math.round(total)} 円<br>
        ドライバー: ${Math.round(driverPay)} 円<br>
        その他: ${Math.round(otherPay)} 円 × ${people - 1}人
    `;
    
    // 計算済みにする
    isCalculated = true;
    setCalculatedState(true);
}


window.addEventListener("load", () => {

    const params = new URLSearchParams(location.search);

    if (!params.toString()) return;

    // 人数（ラジオ）
    const people = params.get("p");
    if (people) {
        const radio = document.querySelector(`input[name="people"][value="${people}"]`);
        if (radio) radio.checked = true;
    }

    document.getElementById("fuelEfficiency").value = params.get("fe") || "";
    document.getElementById("gasPrice").value = params.get("gp") || "";
    document.getElementById("distance").value = params.get("d") || "";
    document.getElementById("rounding").value = params.get("r") || "1";

    document.getElementById("driverType").value = params.get("dt") || "none";
    document.getElementById("driverValue").value = params.get("dv") || "";

    // 表示制御
    document.getElementById("driverType").dispatchEvent(new Event("change"));

    // 高速代復元
    const tolls = (params.get("t") || "").split(",");

    const container = document.getElementById("tollContainer");
    container.innerHTML = "";

    tolls.forEach(val => {
        const div = document.createElement("div");
        div.className = "toll";
        div.innerHTML = `<input type="number" class="tollInput" value="${val}">`;
        container.appendChild(div);
    });
    
    if (params.toString()) {
        calculate();
    }
});

function share(isShare) {

    const people = document.querySelector('input[name="people"]:checked')?.value;
    const fuelEfficiency = document.getElementById("fuelEfficiency").value;
    const gasPrice = document.getElementById("gasPrice").value;
    const distance = document.getElementById("distance").value;
    const rounding = document.getElementById("rounding").value;

    const driverType = document.getElementById("driverType").value;
    const driverValue = document.getElementById("driverValue").value;

    // 高速代（配列）
    const tolls = Array.from(document.querySelectorAll(".tollInput"))
        .map(x => x.value || 0)
        .join(",");

    const params = new URLSearchParams({
        p: people,
        fe: fuelEfficiency,
        gp: gasPrice,
        d: distance,
        r: rounding,
        dt: driverType,
        dv: driverValue,
        t: tolls // カンマ区切り
    });

    const url = location.origin + location.pathname + "?" + params.toString();

    // コピー
    if(isShare){
        navigator.share({ url });
    } else {
        navigator.clipboard.writeText(url);
    }
}

let templates = [];

// =======================
// テンプレ読み込み
// =======================
async function loadTemplates() {

    templates = [
  {
    "id": "fukube_001",
    "name": "フクベ(高岡砺波⇔ふくべの森駐車場)",
    "distance": 360,
    "tolls": [2650,2650],
    "start": "高岡砺波",
    "goal": "フクベ"
  },
  {
    "id": "shirakawa_001",
    "name": "白川(高岡砺波⇔高山⇔道の駅美濃白川)",
    "distance": 370,
    "tolls": [1580,1580],
    "start": "高岡砺波",
    "goal": "白川"
  },
  {
    "id": "toyota_001",
    "name": "豊田(高岡砺波⇔大田エリア駐車場)",
    "distance": 500,
    "tolls": [4490,4490],
    "start": "高岡砺波",
    "goal": "豊田"
  },
  {
    "id": "ena_001",
    "name": "恵那(高岡砺波⇔高山⇔大岩駐車場)",
    "distance": 440,
    "tolls": [1580,1580],
    "start": "高岡砺波",
    "goal": "恵那"
  }
];

    // ボタン形式の場合,こっち
    //renderTemplateList();
    // セレクタ形式の場合,こっち
    //renderTemplateSelect();
    
    // Modalダイアログ軽視の場合,こっち
    setupFilters();
    renderTemplates(templates);
}

// loadイベントに登録
window.addEventListener("load", loadTemplates);


// =======================
// テンプレ一覧（セレクタ）
// =======================
function renderTemplateSelect() {
    const select = document.getElementById("template");

    templates.forEach(t => {
        const option = document.createElement("option");
        option.value = t.id;
        option.textContent = t.name;
        select.appendChild(option);
    });
}

// =======================
// テンプレ一覧（ボタン）
// =======================
function renderTemplateList() {
    const container = document.getElementById("templateList");
    container.innerHTML = "";

    templates.forEach(t => {
        const btn = document.createElement("button");
        btn.textContent = t.name;

        btn.style.margin = "4px";

        btn.onclick = () => applyTemplateById(t.id);

        container.appendChild(btn);
    });
}

// =======================
// テンプレ適用
// =======================
function applyTemplate() {
    const id = document.getElementById("template").value;

    if (!id) return;

    applyTemplateById(id);
}
function applyTemplateById(id) {

    const t = templates.find(x => x.id === id);
    if (!t) return;

    // 距離
    document.getElementById("distance").value = t.distance;

    // 高速代
    const container = document.getElementById("tollContainer");
    container.innerHTML = "";

    t.tolls.forEach(val => {
        const div = document.createElement("div");
        div.className = "toll";
        div.innerHTML = `<input type="number" class="tollInput" value="${val}" placeholder="高速代">
                         <button type="button" class="removeToll">×</button>`;
        container.appendChild(div);
    });

    // 表示（任意）
    document.getElementById("currentTemplate").textContent =
        `選択中: ${t.name}`;

    // 再計算必須
    if (typeof setCalculatedState === "function") {
        setCalculatedState(false);
    }
}

// フィルタ選択肢作成
function setupFilters() {
    const starts = [...new Set(templates.map(t => t.start))];
    const goals = [...new Set(templates.map(t => t.goal))];

    const startSel = document.getElementById("startFilter");
    const goalSel = document.getElementById("goalFilter");

    starts.forEach(s => {
        const opt = document.createElement("option");
        opt.value = s;
        opt.textContent = s;
        startSel.appendChild(opt);
    });

    goals.forEach(g => {
        const opt = document.createElement("option");
        opt.value = g;
        opt.textContent = g;
        goalSel.appendChild(opt);
    });
}

// フィルタ処理
function filterTemplates() {
    const start = document.getElementById("startFilter").value;
    const goal = document.getElementById("goalFilter").value;

    filtered = templates.filter(t => {
        return (!start || t.start === start)
            && (!goal || t.goal === goal);
    });

    renderTemplates(filtered);
}

// 描画
function renderTemplates(list) {
    const container = document.getElementById("templateResults");
    container.innerHTML = "";

    list.forEach(t => {
        const div = document.createElement("div");
        div.textContent = t.name;
        div.onclick = () => applyTemplate(t);

        container.appendChild(div);
    });
}

// 適用
function applyTemplate(t) {
    document.getElementById("distance").value = t.distance;

    const container = document.getElementById("tollContainer");
    container.innerHTML = "";

    t.tolls.forEach(v => {
        const div = document.createElement("div");
        div.className = "toll";
        div.innerHTML = `
            <input type="number" class="tollInput" value="${v}">
            <button type="button" class="removeToll" onclick="this.parentNode.remove()">×</button>
        `;
        container.appendChild(div);
    });

    closeTemplateDialog();
}

// モーダル制御
function openTemplateDialog() {
    document.getElementById("templateModal").style.display = "block";
}

function closeTemplateDialog() {
    document.getElementById("templateModal").style.display = "none";
}

</script>

</body>
</html>
